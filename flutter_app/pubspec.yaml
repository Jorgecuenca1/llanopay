name: llanopay
description: Billetera digital regional para los Llanos Orientales de Colombia
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7
  dio: ^5.7.0
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4
  go_router: ^14.7.1
  google_fonts: ^6.2.1
  intl: ^0.20.2
  pin_code_fields: ^8.0.1
  qr_flutter: ^4.1.0
  web_socket_channel: ^3.0.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.70.2
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  local_auth: ^2.3.0
  flutter_local_notifications: ^18.0.1
  geolocator: ^13.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
