<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesion | SuperNova Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --lp-green: #2E7D32;
            --lp-green-dark: #1B5E20;
            --lp-gold: #F9A825;
            --lp-gold-dark: #F57F17;
        }

        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 40%, #388E3C 70%, #1B5E20 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 80%;
            height: 120%;
            background: radial-gradient(ellipse, rgba(249, 168, 37, .1) 0%, transparent 70%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -40%;
            left: -20%;
            width: 60%;
            height: 100%;
            background: radial-gradient(ellipse, rgba(255,255,255,.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .login-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,.2);
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, var(--lp-green-dark), var(--lp-green));
            padding: 32px 32px 28px;
            text-align: center;
        }

        .login-header .brand-icon {
            width: 56px;
            height: 56px;
            background: var(--lp-gold);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--lp-green-dark);
            font-weight: 800;
            margin-bottom: 12px;
        }

        .login-header h4 {
            color: #fff;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .login-header p {
            color: rgba(255,255,255,.7);
            font-size: .85rem;
            margin: 0;
        }

        .login-body {
            padding: 32px;
        }

        .login-body .form-label {
            font-weight: 600;
            font-size: .85rem;
            color: #374151;
        }

        .login-body .form-control {
            border-radius: 10px;
            border: 1.5px solid #e5e7eb;
            padding: 10px 14px;
            font-size: .9rem;
        }

        .login-body .form-control:focus {
            border-color: var(--lp-green);
            box-shadow: 0 0 0 3px rgba(46, 125, 50, .15);
        }

        .login-body .input-group-text {
            border-radius: 10px 0 0 10px;
            border: 1.5px solid #e5e7eb;
            border-right: 0;
            background: #f9fafb;
            color: #6b7280;
        }

        .login-body .input-group .form-control {
            border-radius: 0 10px 10px 0;
        }

        .btn-login {
            background: var(--lp-green);
            color: #fff;
            border: none;
            font-weight: 600;
            border-radius: 10px;
            padding: 12px;
            font-size: .95rem;
            width: 100%;
            transition: all .2s;
        }

        .btn-login:hover {
            background: var(--lp-green-dark);
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(46, 125, 50, .3);
        }

        .login-footer {
            text-align: center;
            padding: 0 32px 24px;
        }

        .login-footer p {
            margin: 0;
            font-size: .75rem;
            color: #9ca3af;
        }

        .login-footer .cultural-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            padding: 4px 12px;
            background: #f9fafb;
            border-radius: 20px;
            font-size: .72rem;
            color: #6b7280;
        }

        .login-footer .cultural-badge i {
            color: var(--lp-gold);
        }

        .alert-login {
            border-radius: 10px;
            font-size: .85rem;
            border: none;
            background: #FEE2E2;
            color: #991B1B;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="brand-icon">SN</div>
                <h4>SuperNova</h4>
                <p>Panel de Administracion</p>
            </div>
            <div class="login-body">
                {% if error %}
                <div class="alert alert-login mb-3">
                    <i class="fas fa-exclamation-circle me-2"></i>{{ error }}
                </div>
                {% endif %}

                <form method="post" action="{% url 'dashboard:login' %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label" for="phone_number">Numero de telefono</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-phone"></i></span>
                            <input type="text" class="form-control" id="phone_number" name="phone_number"
                                   placeholder="+573001234567" required autocomplete="tel"
                                   value="{{ request.POST.phone_number|default:'' }}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="password">Contrasena</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="Ingrese su contrasena" required autocomplete="current-password">
                        </div>
                    </div>
                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember" value="1">
                        <label class="form-check-label" for="remember" style="font-size:.85rem; color:#6b7280;">
                            Recordarme
                        </label>
                    </div>
                    <button type="submit" class="btn btn-login">
                        <i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesion
                    </button>
                </form>
            </div>
            <div class="login-footer">
                <p>Acceso exclusivo para administradores</p>
                <div class="cultural-badge">
                    <i class="fas fa-horse"></i> Orgullo Llanero
                </div>
            </div>
        </div>
    </div>
</body>
</html>
